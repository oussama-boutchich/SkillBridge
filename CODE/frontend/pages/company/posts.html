<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SkillBridge — Manage your company's job and internship postings.">
    <title>SkillBridge | My Postings</title>

    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">

    <style>
        .post-table { width: 100%; border-collapse: collapse; }
        .post-table th {
            text-align: left;
            font-size:  var(--font-size-xs);
            font-weight: var(--font-weight-semibold);
            color:       var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding:     var(--space-3) var(--space-4);
            border-bottom: 2px solid var(--color-border);
        }
        .post-table td {
            padding: var(--space-4);
            border-bottom: 1px solid var(--color-border);
            font-size: var(--font-size-sm);
            color:     var(--color-text-secondary);
            vertical-align: middle;
        }
        .post-table tr:hover td { background: var(--color-surface-low); }
        .post-table tr:last-child td { border-bottom: none; }

        .post-title-cell {
            font-weight: var(--font-weight-semibold);
            color:       var(--color-text-primary);
            max-width:   260px;
            white-space: nowrap;
            overflow:    hidden;
            text-overflow: ellipsis;
        }

        .create-form-card {
            background:    var(--color-surface);
            border:        1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding:       var(--space-6);
            display:       none;
            margin-bottom: var(--space-6);
        }

        .create-form-card.visible { display: block; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar__brand">
            <div class="sidebar__brand-icon">SB</div>
            <span class="sidebar__brand-text">SkillBridge</span>
        </a>
        <nav class="sidebar__nav">
            <a href="dashboard.html"  class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-gauge-high"></i></span><span class="sidebar__text">Dashboard</span></a>
            <a href="posts.html"      class="sidebar__link active"><span class="sidebar__icon"><i class="fa-solid fa-pen-to-square"></i></span><span class="sidebar__text">My Postings</span></a>
            <a href="applicants.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-users"></i></span><span class="sidebar__text">Applicants</span></a>
            <span class="sidebar__nav-section">Account</span>
            <a href="profile.html"    class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-building"></i></span><span class="sidebar__text">Company Profile</span></a>
            <a href="notifications.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-bell"></i></span><span class="sidebar__text">Notifications</span><span class="sidebar__badge" id="notif-badge" style="display:none;"></span></a>
        </nav>
        <div class="sidebar__footer">
            <div class="sidebar__user">
                <div class="sidebar__avatar" id="user-avatar">?</div>
                <div class="sidebar__user-info">
                    <div class="sidebar__user-name" id="user-name">Loading…</div>
                    <div class="sidebar__user-role">Company / HR</div>
                </div>
            </div>
            <button class="btn btn--ghost btn--full" id="btn-logout" style="margin-top:var(--space-2); justify-content:flex-start; color:var(--color-danger); font-size:var(--font-size-xs);"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-header">
            <div class="header__left">
                <button class="header__menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <span class="header__page-title">My Postings</span>
            </div>
            <div class="header__right">
                <button class="btn btn--primary btn--sm" id="btn-toggle-create">+ New Posting</button>
                <button class="header__notif-btn" onclick="location.href='notifications.html'"><i class="fa-solid fa-bell"></i></button>
                <button class="header__avatar-btn" onclick="location.href='profile.html'">
                    <div class="header__avatar avatar avatar--md" id="header-avatar">?</div>
                </button>
            </div>
        </header>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Manage Postings</h1>
                    <p class="page-subtitle" id="posts-count">Loading…</p>
                </div>
                <button class="btn btn--primary" id="btn-toggle-create2">+ New Posting</button>
            </div>

            <!-- Create / Edit Form -->
            <div class="create-form-card" id="create-form-card">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-5); padding-bottom:var(--space-4); border-bottom:1px solid var(--color-border);">
                    <h2 style="font-size:var(--font-size-lg); font-weight:var(--font-weight-semibold);" id="form-title"><i class="fa-solid fa-pen-to-square"></i> Create New Posting</h2>
                    <button class="btn btn--ghost btn--sm" id="btn-form-close">× Cancel</button>
                </div>

                <div id="form-alert" class="alert alert--error" style="display:none;">
                    <span class="alert__icon"><i class="fa-solid fa-triangle-exclamation"></i></span>
                    <span class="alert__body" id="form-alert-text"></span>
                </div>

                <form id="post-form" novalidate>
                    <input type="hidden" id="edit-post-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="pf-title" class="form-label">Title <span class="required">*</span></label>
                            <input type="text" id="pf-title" class="form-control" placeholder="e.g. Frontend Developer Intern" required>
                            <span class="form-error" id="err-title" style="display:none;"></span>
                        </div>
                        <div class="form-group">
                            <label for="pf-type" class="form-label">Type <span class="required">*</span></label>
                            <select id="pf-type" class="form-control" required>
                                <option value="">— Select type —</option>
                                <option value="internship">Internship</option>
                                <option value="job">Job</option>
                                <option value="challenge">Challenge</option>
                            </select>
                            <span class="form-error" id="err-type" style="display:none;"></span>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="pf-location" class="form-label">Location</label>
                            <input type="text" id="pf-location" class="form-control" placeholder="e.g. Algiers, Algeria">
                        </div>
                        <div class="form-group">
                            <label for="pf-deadline" class="form-label">Application Deadline</label>
                            <input type="date" id="pf-deadline" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="display:flex; align-items:center; gap:var(--space-2); cursor:pointer; font-size:var(--font-size-sm); color:var(--color-text-secondary);">
                            <input type="checkbox" id="pf-remote" style="width:16px; height:16px; accent-color:var(--color-primary);">
                            This is a remote opportunity
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="pf-desc" class="form-label">Description <span class="required">*</span></label>
                        <textarea id="pf-desc" class="form-control" placeholder="Describe the role, responsibilities, and what the candidate will work on…" style="min-height:120px;" required></textarea>
                        <span class="form-error" id="err-description" style="display:none;"></span>
                    </div>
                    <div class="form-group">
                        <label for="pf-req" class="form-label">Requirements & Skills</label>
                        <textarea id="pf-req" class="form-control" placeholder="List required skills, qualifications, and experience…" style="min-height:80px;"></textarea>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:var(--space-3); margin-top:var(--space-4);">
                        <button type="button" class="btn btn--secondary" id="btn-form-cancel2">Cancel</button>
                        <button type="submit" id="btn-submit-post" class="btn btn--primary">Publish Posting</button>
                    </div>
                </form>
            </div>

            <!-- Posts Table -->
            <div class="card" id="posts-table-card">
                <div id="posts-table-body">
                    <div class="skeleton" style="height:48px; margin-bottom:var(--space-2);"></div>
                    <div class="skeleton" style="height:48px; margin-bottom:var(--space-2);"></div>
                    <div class="skeleton" style="height:48px;"></div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-overlay" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:420px;">
        <div class="modal__header">
            <h2 class="modal__title">Delete Posting?</h2>
            <button class="modal__close" onclick="closeDeleteModal()">×</button>
        </div>
        <p style="font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:var(--space-5);">
            This will permanently delete <strong id="del-post-name"></strong> and all its applications. This action cannot be undone.
        </p>
        <div class="modal__footer">
            <button class="btn btn--secondary" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn btn--danger" id="del-confirm">Yes, Delete</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/utils.js"></script>
<script>
let currentUser  = null;
let posts        = [];
let deleteTarget = null;
let editMode     = false;

(async () => {
    currentUser = await auth.requireRole('company');
    if (!currentUser) return;

    const init = utils.initials(currentUser.full_name);
    document.getElementById('user-avatar').textContent   = init;
    document.getElementById('user-name').textContent     = currentUser.full_name;
    document.getElementById('header-avatar').textContent = init;

    // Notif count
    try {
        const n = await api.get('/notifications');
        if (n.unread > 0) {
            document.getElementById('notif-badge').style.display = '';
            document.getElementById('notif-badge').textContent   = n.unread;
        }
    } catch {}

    // Auto-open form if ?new=1
    if (new URLSearchParams(window.location.search).get('new') === '1') toggleCreateForm(true);

    loadPosts();
})();

document.getElementById('menu-btn').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('btn-logout').addEventListener('click', async () =>
    await auth.logout());

['btn-toggle-create','btn-toggle-create2'].forEach(id =>
    document.getElementById(id).addEventListener('click', () => toggleCreateForm()));
['btn-form-close','btn-form-cancel2'].forEach(id =>
    document.getElementById(id).addEventListener('click', () => toggleCreateForm(false)));

document.getElementById('post-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('btn-submit-post');
    const title = document.getElementById('pf-title').value.trim();
    const type  = document.getElementById('pf-type').value;
    const desc  = document.getElementById('pf-desc').value.trim();

    ['title','type','description'].forEach(f => utils.setError('err-'+f, ''));
    document.getElementById('form-alert').style.display = 'none';

    let valid = true;
    if (!title) { utils.setError('err-title', 'Title is required.'); valid = false; }
    if (!type)  { utils.setError('err-type',  'Please select a type.'); valid = false; }
    if (!desc)  { utils.setError('err-description', 'Description is required.'); valid = false; }
    if (!valid) return;

    utils.setLoading(btn, true);

    const payload = {
        title,
        type,
        description:  desc,
        requirements: document.getElementById('pf-req').value.trim() || null,
        location:     document.getElementById('pf-location').value.trim() || null,
        is_remote:    document.getElementById('pf-remote').checked ? 1 : 0,
        deadline:     document.getElementById('pf-deadline').value || null,
    };

    try {
        const postId = document.getElementById('edit-post-id').value;
        if (editMode && postId) {
            await api.put(`/posts/${postId}`, payload);
            toast.success('Updated!', 'Posting has been updated successfully.');
        } else {
            await api.post('/posts', payload);
            toast.success('Published!', `"${title}" is now live.`);
        }
        toggleCreateForm(false);
        await loadPosts();
    } catch (err) {
        document.getElementById('form-alert-text').textContent = err.message || 'Failed to save posting.';
        document.getElementById('form-alert').style.display = 'flex';
        if (err.errors) {
            Object.entries(err.errors).forEach(([f, m]) => utils.setError('err-'+f, m));
        }
    } finally {
        utils.setLoading(btn, false);
    }
});

document.getElementById('del-confirm').addEventListener('click', async () => {
    if (!deleteTarget) return;
    const btn = document.getElementById('del-confirm');
    utils.setLoading(btn, true);
    try {
        await api.delete(`/posts/${deleteTarget}`);
        toast.success('Deleted', 'Posting has been removed.');
        closeDeleteModal();
        await loadPosts();
    } catch (err) {
        toast.error('Error', err.message || 'Failed to delete.');
    } finally {
        utils.setLoading(btn, false);
    }
});

async function loadPosts() {
    const body = document.getElementById('posts-table-body');
    body.innerHTML = `
        <div class="skeleton" style="height:48px; margin-bottom:var(--space-2);"></div>
        <div class="skeleton" style="height:48px; margin-bottom:var(--space-2);"></div>
        <div class="skeleton" style="height:48px;"></div>`;

    try {
        posts = await api.get('/posts/my');
        document.getElementById('posts-count').textContent =
            `${posts.length} posting${posts.length !== 1 ? 's' : ''} · ${posts.filter(p => p.status === 'active').length} active`;
        renderTable();
    } catch (err) {
        body.innerHTML = `<p style="text-align:center; padding:var(--space-6); color:var(--color-text-muted);">Failed to load: ${utils.escapeHtml(err.message)}</p>`;
    }
}

function renderTable() {
    const body = document.getElementById('posts-table-body');
    if (!posts.length) {
        body.innerHTML = `
            <div class="empty-state">
                <div class="empty-state__icon"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="empty-state__title">No postings yet</div>
                <div class="empty-state__text">Create your first job or internship posting to start receiving applications.</div>
                <button class="btn btn--primary btn--sm" onclick="toggleCreateForm(true)">+ Create Posting</button>
            </div>`;
        return;
    }

    body.innerHTML = `
        <table class="post-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Applicants</th>
                    <th>Deadline</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                ${posts.map(p => `
                <tr>
                    <td class="post-title-cell">${utils.escapeHtml(p.title)}</td>
                    <td><span class="badge badge--${p.type}">${p.type}</span></td>
                    <td><span class="badge badge--${p.status}">${p.status}</span></td>
                    <td>
                        <a href="applicants.html?post_id=${p.id}" style="font-weight:var(--font-weight-semibold); color:var(--color-primary);">
                            ${p.applications_count} →
                        </a>
                    </td>
                    <td>${p.deadline ? utils.formatDate(p.deadline) : '—'}</td>
                    <td>
                        <div style="display:flex; gap:var(--space-2);">
                            <button class="btn btn--ghost btn--sm" onclick="startEdit(${p.id})"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                            <button class="btn btn--danger-outline btn--sm" onclick="openDeleteModal(${p.id}, '${utils.escapeHtml(p.title).replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`).join('')}
            </tbody>
        </table>`;
}

function toggleCreateForm(forceOpen = null) {
    const card = document.getElementById('create-form-card');
    const isOpen = card.classList.contains('visible');
    const open = forceOpen !== null ? forceOpen : !isOpen;
    if (open) {
        card.classList.add('visible');
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
        card.classList.remove('visible');
        resetForm();
    }
}

function resetForm() {
    document.getElementById('post-form').reset();
    document.getElementById('edit-post-id').value = '';
    document.getElementById('form-title').textContent = '<i class="fa-solid fa-pen-to-square"></i> Create New Posting';
    document.getElementById('btn-submit-post').textContent = 'Publish Posting';
    document.getElementById('form-alert').style.display = 'none';
    editMode = false;
}

function startEdit(id) {
    const post = posts.find(p => p.id === id);
    if (!post) return;

    editMode = true;
    document.getElementById('edit-post-id').value  = id;
    document.getElementById('form-title').textContent = '<i class="fa-solid fa-pen-to-square"></i> Edit Posting';
    document.getElementById('btn-submit-post').textContent = 'Save Changes';
    document.getElementById('pf-title').value    = post.title    || '';
    document.getElementById('pf-type').value     = post.type     || '';
    document.getElementById('pf-desc').value     = post.description || '';
    document.getElementById('pf-req').value      = post.requirements || '';
    document.getElementById('pf-location').value = post.location  || '';
    document.getElementById('pf-deadline').value = post.deadline  ? post.deadline.split('T')[0] : '';
    document.getElementById('pf-remote').checked = !!parseInt(post.is_remote);

    toggleCreateForm(true);
}

function openDeleteModal(id, name) {
    deleteTarget = id;
    document.getElementById('del-post-name').textContent = name;
    document.getElementById('delete-overlay').style.display = 'flex';
}
function closeDeleteModal() {
    document.getElementById('delete-overlay').style.display = 'none';
    deleteTarget = null;
}
</script>

</body>
</html>
