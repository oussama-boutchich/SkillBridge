<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SkillBridge — Company notification centre.">
    <title>SkillBridge | Notifications</title>

    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">

    <style>
        .notif-list { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); overflow:hidden; }
        .notif-item { display:flex; align-items:flex-start; gap:var(--space-4); padding:var(--space-4) var(--space-5); border-bottom:1px solid var(--color-border); cursor:pointer; transition:background var(--transition-fast); position:relative; }
        .notif-item:last-child { border-bottom:none; }
        .notif-item:hover { background:var(--color-surface-low); }
        .notif-item--unread { background:linear-gradient(90deg,rgba(0,74,198,0.04) 0%,transparent 100%); }
        .notif-item--unread::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--color-primary); }
        .notif-item__icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
        .notif-item__body { flex:1; min-width:0; }
        .notif-item__title { font-size:var(--font-size-sm); font-weight:var(--font-weight-semibold); color:var(--color-text-primary); margin-bottom:3px; }
        .notif-item__msg { font-size:var(--font-size-xs); color:var(--color-text-muted); line-height:1.5; }
        .notif-item__time { font-size:var(--font-size-xs); color:var(--color-text-muted); flex-shrink:0; white-space:nowrap; margin-top:2px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar__brand">
            <div class="sidebar__brand-icon">SB</div>
            <span class="sidebar__brand-text">SkillBridge</span>
        </a>
        <nav class="sidebar__nav">
            <a href="dashboard.html"  class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-gauge-high"></i></span><span class="sidebar__text">Dashboard</span></a>
            <a href="posts.html"      class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-pen-to-square"></i></span><span class="sidebar__text">My Postings</span></a>
            <a href="applicants.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-users"></i></span><span class="sidebar__text">Applicants</span></a>
            <span class="sidebar__nav-section">Account</span>
            <a href="profile.html"    class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-building"></i></span><span class="sidebar__text">Company Profile</span></a>
            <a href="notifications.html" class="sidebar__link active"><span class="sidebar__icon"><i class="fa-solid fa-bell"></i></span><span class="sidebar__text">Notifications</span></a>
        </nav>
        <div class="sidebar__footer">
            <div class="sidebar__user">
                <div class="sidebar__avatar" id="user-avatar">?</div>
                <div class="sidebar__user-info">
                    <div class="sidebar__user-name" id="user-name">Loading…</div>
                    <div class="sidebar__user-role">Company / HR</div>
                </div>
            </div>
            <button class="btn btn--ghost btn--full" id="btn-logout" style="margin-top:var(--space-2); justify-content:flex-start; color:var(--color-danger); font-size:var(--font-size-xs);"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-header">
            <div class="header__left">
                <button class="header__menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <span class="header__page-title">Notifications</span>
            </div>
            <div class="header__right">
                <button class="header__notif-btn"><i class="fa-solid fa-bell"></i></button>
                <button class="header__avatar-btn" onclick="location.href='profile.html'">
                    <div class="header__avatar avatar avatar--md" id="header-avatar">?</div>
                </button>
            </div>
        </header>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Notifications</h1>
                    <p class="page-subtitle" id="notif-subtitle">Loading…</p>
                </div>
                <button class="btn btn--secondary" id="btn-read-all"><i class="fa-solid fa-check-double"></i> Mark All Read</button>
            </div>

            <div id="notif-skeleton">
                <div class="skeleton" style="height:72px; border-radius:var(--radius-lg); margin-bottom:var(--space-2);"></div>
                <div class="skeleton" style="height:72px; border-radius:var(--radius-lg);"></div>
            </div>
            <div id="notif-container" style="display:none;"></div>
        </main>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/utils.js"></script>
<script>
let currentUser = null;
let notifs = [];

(async () => {
    currentUser = await auth.requireRole('company');
    if (!currentUser) return;
    const init = utils.initials(currentUser.full_name);
    document.getElementById('user-avatar').textContent   = init;
    document.getElementById('user-name').textContent     = currentUser.full_name;
    document.getElementById('header-avatar').textContent = init;
    loadNotifs();
})();

document.getElementById('menu-btn').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('btn-logout').addEventListener('click', async () => await auth.logout());

document.getElementById('btn-read-all').addEventListener('click', async () => {
    const btn = document.getElementById('btn-read-all');
    utils.setLoading(btn, true);
    try {
        await api.patch('/notifications/read-all', {});
        notifs = notifs.map(n => ({ ...n, is_read: 1 }));
        renderNotifs();
        toast.success('Done!', 'All notifications marked as read.');
    } catch {}
    finally { utils.setLoading(btn, false); }
});

async function loadNotifs() {
    try {
        const data = await api.get('/notifications');
        notifs = data.items || [];
        document.getElementById('notif-subtitle').textContent =
            `${notifs.length} notification${notifs.length !== 1 ? 's' : ''} · ${data.unread || 0} unread`;
        document.getElementById('notif-skeleton').style.display  = 'none';
        document.getElementById('notif-container').style.display = '';
        renderNotifs();
    } catch (err) {
        document.getElementById('notif-skeleton').innerHTML =
            `<p style="color:var(--color-text-muted); text-align:center; padding:var(--space-6);">Failed to load: ${utils.escapeHtml(err.message)}</p>`;
    }
}

function renderNotifs() {
    const el = document.getElementById('notif-container');
    if (!notifs.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state__icon"><i class="fa-solid fa-bell"></i></div><div class="empty-state__title">No notifications yet</div><div class="empty-state__text">You'll be notified when students apply to your postings.</div></div>`;
        return;
    }
    const icons = { new_application:'<i class="fa-solid fa-envelope"></i>', application_accepted:'<i class="fa-solid fa-party-horn"></i>', application_rejected:'<i class="fa-solid fa-clipboard-list"></i>', system:'<i class="fa-solid fa-gear"></i>' };
    el.innerHTML = `<div class="notif-list">` + notifs.map(n => `
        <div class="notif-item ${!n.is_read ? 'notif-item--unread' : ''}" onclick="markRead(${n.id})">
            <div class="notif-item__icon" style="background:var(--color-primary-surface);">${icons[n.type] || '<i class="fa-solid fa-bell"></i>'}</div>
            <div class="notif-item__body">
                <div class="notif-item__title">${utils.escapeHtml(n.title)}${!n.is_read ? ' <span style="display:inline-block;width:6px;height:6px;background:var(--color-primary);border-radius:50%;margin-left:4px;vertical-align:middle;"></span>' : ''}</div>
                <div class="notif-item__msg">${utils.escapeHtml(n.message)}</div>
            </div>
            <div class="notif-item__time">${utils.timeAgo(n.created_at)}</div>
        </div>
    `).join('') + `</div>`;
}

async function markRead(id) {
    const n = notifs.find(x => x.id === id);
    if (!n || n.is_read) return;
    try {
        await api.patch(`/notifications/${id}/read`, {});
        n.is_read = 1;
        renderNotifs();
    } catch {}
}
</script>
</body>
</html>
