<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SkillBridge — Browse internships, jobs and challenges from top companies.">
    <title>SkillBridge | Browse Opportunities</title>

    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <style>
        /* ── Filter bar ── */
        .filter-bar {
            display:       flex;
            align-items:   center;
            gap:           var(--space-3);
            flex-wrap:     wrap;
            margin-bottom: var(--space-6);
            padding:       var(--space-4) var(--space-5);
            background:    var(--color-surface);
            border-radius: var(--radius-lg);
            border:        1px solid var(--color-border);
        }

        .filter-bar__search {
            display:     flex;
            align-items: center;
            gap:         var(--space-2);
            background:  var(--color-surface-low);
            border:      1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding:     var(--space-2) var(--space-4);
            flex:        1;
            min-width:   200px;
            transition:  border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .filter-bar__search:focus-within {
            border-color: var(--color-primary);
            box-shadow:   0 0 0 3px rgba(0,74,198,0.1);
        }

        .filter-bar__search input {
            border:     none;
            background: transparent;
            outline:    none;
            font-size:  var(--font-size-sm);
            color:      var(--color-text-primary);
            flex:       1;
        }

        .filter-bar__search input::placeholder { color: var(--color-text-muted); }

        .filter-tabs {
            display: flex;
            gap:     var(--space-2);
        }

        .filter-tab {
            padding:       var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            font-size:     var(--font-size-xs);
            font-weight:   var(--font-weight-semibold);
            cursor:        pointer;
            border:        1px solid var(--color-border);
            background:    var(--color-surface);
            color:         var(--color-text-secondary);
            transition:    all var(--transition-fast);
        }

        .filter-tab:hover {
            border-color: var(--color-primary);
            color:        var(--color-primary);
        }

        .filter-tab.active {
            background:   var(--color-primary);
            border-color: var(--color-primary);
            color:        #fff;
        }

        /* ── Job cards grid ── */
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap:     var(--space-5);
        }

        .job-card {
            background:    var(--color-surface);
            border-radius: var(--radius-lg);
            border:        1px solid var(--color-border);
            padding:       var(--space-5);
            box-shadow:    var(--shadow-xs);
            transition:    transform var(--transition-base), box-shadow var(--transition-base);
            display:       flex;
            flex-direction: column;
            gap:           var(--space-3);
            cursor:        pointer;
            text-decoration: none;
        }

        .job-card:hover {
            transform:  translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-primary-border);
        }

        .job-card__top {
            display:         flex;
            align-items:     flex-start;
            justify-content: space-between;
        }

        .job-card__company-avatar {
            width:         44px;
            height:        44px;
            border-radius: var(--radius-md);
            background:    var(--color-primary-surface);
            display:       flex;
            align-items:   center;
            justify-content: center;
            font-size:     var(--font-size-md);
            font-weight:   var(--font-weight-bold);
            color:         var(--color-primary);
            flex-shrink:   0;
        }

        .job-card__title {
            font-size:   var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            color:       var(--color-text-primary);
            line-height: 1.3;
        }

        .job-card__company {
            font-size:  var(--font-size-sm);
            color:      var(--color-text-muted);
            margin-top: 2px;
        }

        .job-card__meta {
            display:   flex;
            flex-wrap: wrap;
            gap:       var(--space-3);
            font-size: var(--font-size-xs);
            color:     var(--color-text-muted);
        }

        .job-card__meta-item {
            display:     flex;
            align-items: center;
            gap:         4px;
        }

        .job-card__footer {
            display:         flex;
            align-items:     center;
            justify-content: space-between;
            margin-top:      auto;
        }

        /* Pagination */
        .pagination {
            display:         flex;
            align-items:     center;
            justify-content: center;
            gap:             var(--space-2);
            margin-top:      var(--space-8);
        }

        .page-btn {
            width:         36px;
            height:        36px;
            border-radius: var(--radius-md);
            border:        1px solid var(--color-border);
            background:    var(--color-surface);
            color:         var(--color-text-secondary);
            font-size:     var(--font-size-sm);
            cursor:        pointer;
            display:       flex;
            align-items:   center;
            justify-content: center;
            transition:    all var(--transition-fast);
        }

        .page-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .page-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
        .page-btn:disabled { opacity: 0.4; pointer-events: none; }

        @media (max-width: 600px) {
            .jobs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar__brand">
            <div class="sidebar__brand-icon">SB</div>
            <span class="sidebar__brand-text">SkillBridge</s        <nav class="sidebar__nav">
            <a href="dashboard.html"   class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-gauge-high"></i></span><span class="sidebar__text">Dashboard</span></a>
            <a href="browse-jobs.html" class="sidebar__link active"><span class="sidebar__icon"><i class="fa-solid fa-magnifying-glass"></i></span><span class="sidebar__text">Browse Opportunities</span></a>
            <a href="applications.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-file-lines"></i></span><span class="sidebar__text">My Applications</span></a>
            <a href="certificates.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-trophy"></i></span><span class="sidebar__text">Certificates</span></a>
            <span class="sidebar__nav-section">Account</span>
            <a href="profile.html"    class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-circle-user"></i></span><span class="sidebar__text">My Profile</span></a>
            <a href="notifications.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-bell"></i></span><span class="sidebar__text">Notifications</span><span class="sidebar__badge" id="notif-badge" style="display:none;"></span></a>
        </nav>
        <div class="sidebar__footer">
            <div class="sidebar__user">
                <div class="sidebar__avatar" id="user-avatar">?</div>
                <div class="sidebar__user-info">
                    <div class="sidebar__user-name" id="user-name">Loading…</div>
                    <div class="sidebar__user-role">Student</div>
                </div>
            </div>
            <button class="btn btn--ghost btn--full" id="btn-logout" style="margin-top:var(--space-2); justify-content:flex-start; color:var(--color-danger); font-size:var(--font-size-xs);"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="app-main">
        <header class="app-header">
            <div class="header__left">
                <button class="header__menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <span class="header__page-title">Browse Opportunities</span>
            </div>
            <div class="header__right">
                <button class="header__notif-btn" onclick="location.href='notifications.html'"><i class="fa-solid fa-bell"></i>
                    <span class="header__notif-count" id="header-notif-count" style="display:none;"></span>
                </button>
                <button class="header__avatar-btn" onclick="location.href='profile.html'">
                    <div class="header__avatar avatar avatar--md" id="header-avatar">?</div>
                </button>
            </div>
        </header>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Opportunities</h1>
                    <p class="page-subtitle" id="result-count">Loading opportunities…</p>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-bar__search">
                    <i class="fa-solid fa-magnifying-glass" style="color:var(--color-text-muted);"></i>
                    <input type="search" id="search-input" placeholder="Search by title, company…">
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-type="">All</button>
                    <button class="filter-tab" data-type="internship">Internships</button>
                    <button class="filter-tab" data-type="job">Jobs</button>
                    <button class="filter-tab" data-type="challenge">Challenges</button>
                </div>
            </div>

                <!-- Jobs Grid -->
            <div id="jobs-container">
                <div class="jobs-grid" id="jobs-grid">
                    <!-- Skeleton placeholders -->
                    <div class="skeleton" style="height:180px; border-radius:var(--radius-lg);"></div>
                    <div class="skeleton" style="height:180px; border-radius:var(--radius-lg);"></div>
                    <div class="skeleton" style="height:180px; border-radius:var(--radius-lg);"></div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/utils.js"></script>
<script>
let currentUser = null;
let currentPage = 1;
let currentType = '';
let currentSearch = '';
let searchTimer  = null;

(async () => {
    currentUser = await auth.requireRole('student');
    if (!currentUser) return;

    // Set user UI
    const init = utils.initials(currentUser.full_name);
    document.getElementById('user-avatar').textContent   = init;
    document.getElementById('user-name').textContent     = currentUser.full_name;
    document.getElementById('header-avatar').textContent = init;

    // Load notif count
    try {
        const n = await api.get('/notifications');
        if (n.unread > 0) {
            document.getElementById('notif-badge').style.display         = '';
            document.getElementById('notif-badge').textContent           = n.unread;
            document.getElementById('header-notif-count').style.display  = '';
            document.getElementById('header-notif-count').textContent    = n.unread;
        }
    } catch {}

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('search')) {
        currentSearch = params.get('search');
        document.getElementById('search-input').value = currentSearch;
    }
    if (params.get('type')) {
        currentType = params.get('type');
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.type === currentType);
        });
    }

    loadJobs();
})();

document.getElementById('menu-btn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

document.getElementById('btn-logout').addEventListener('click', async () => {
    await auth.logout();
});

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
        currentPage = 1;
        loadJobs();
    });
});

// Search (debounced)
document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        currentSearch = e.target.value.trim();
        currentPage   = 1;
        loadJobs();
    }, 400);
});

async function loadJobs() {
    const grid = document.getElementById('jobs-grid');
    grid.innerHTML = [1,2,3,4,5,6].map(() =>
        `<div class="skeleton" style="height:200px; border-radius:var(--radius-lg);"></div>`
    ).join('');

    const params = { page: currentPage };
    if (currentType)   params.type   = currentType;
    if (currentSearch) params.search = currentSearch;

    try {
        const data  = await api.get('/posts', params);
        const posts = data.items || [];
        const pg    = data.pagination || {};

        document.getElementById('result-count').textContent =
            `${pg.total_items ?? posts.length} opportunit${posts.length !== 1 ? 'ies' : 'y'} found`;

        if (!posts.length) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <div class="empty-state__icon"><i class="fa-solid fa-magnifying-glass"></i></div>
                    <div class="empty-state__title">No opportunities found</div>
                    <div class="empty-state__text">Try adjusting your search or filters.</div>
                </div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        grid.innerHTML = posts.map(p => buildCard(p)).join('');
        renderPagination(pg);

    } catch (err) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
                <div class="empty-state__icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="empty-state__title">Failed to load opportunities</div>
                <div class="empty-state__text">${utils.escapeHtml(err.message)}</div>
                <button class="btn btn--outline btn--sm" onclick="loadJobs()">Retry</button>
            </div>`;
    }
}

function buildCard(p) {
    const company     = utils.escapeHtml(p.company_name || 'Unknown Company');
    const initials    = company.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
    const location    = p.is_remote ? '<i class="fa-solid fa-globe"></i> Remote' : (p.location ? '<i class="fa-solid fa-location-dot"></i> ' + utils.escapeHtml(p.location) : '<i class="fa-solid fa-location-dot"></i> On-site');
    const deadline    = p.deadline ? '<i class="fa-regular fa-calendar"></i> ' + utils.formatDate(p.deadline) : '';
    const applicants  = parseInt(p.applications_count) || 0;

    const typeColors = { internship: 'var(--color-primary-surface)', job:'#f0fdf4', challenge:'var(--color-warning-bg)' };

    return `
    <a href="job-detail.html?id=${p.id}" class="job-card">
        <div class="job-card__top">
            <div>
                <div class="job-card__title">${utils.escapeHtml(p.title)}</div>
                <div class="job-card__company">${company}</div>
            </div>
            <div class="job-card__company-avatar" style="background:${typeColors[p.type] || 'var(--color-primary-surface)'};">
                ${initials.slice(0,2)}
            </div>
        </div>
        <div class="job-card__meta">
            <span class="job-card__meta-item">${location}</span>
            ${deadline ? `<span class="job-card__meta-item">${deadline}</span>` : ''}
            <span class="job-card__meta-item"><i class="fa-solid fa-users"></i> ${applicants} applicant${applicants !== 1 ? 's' : ''}</span>
        </div>
        <div class="job-card__footer">
            <span class="badge badge--${p.type}">${p.type.charAt(0).toUpperCase() + p.type.slice(1)}</span>
            <span class="btn btn--outline btn--sm">View →</span>
        </div>
    </a>`;
}

function renderPagination(pg) {
    const el = document.getElementById('pagination');
    if (!pg || pg.total_pages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${pg.current_page - 1})" ${pg.current_page <= 1 ? 'disabled' : ''}>‹</button>`;

    for (let i = 1; i <= pg.total_pages; i++) {
        if (pg.total_pages > 7 && Math.abs(i - pg.current_page) > 2 && i !== 1 && i !== pg.total_pages) {
            if (i === pg.current_page - 3 || i === pg.current_page + 3) {
                html += `<span style="color:var(--color-text-muted);">…</span>`;
            }
            continue;
        }
        html += `<button class="page-btn ${i === pg.current_page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }

    html += `<button class="page-btn" onclick="goPage(${pg.current_page + 1})" ${pg.current_page >= pg.total_pages ? 'disabled' : ''}>›</button>`;
    el.innerHTML = html;
}

function goPage(page) {
    currentPage = page;
    loadJobs();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
