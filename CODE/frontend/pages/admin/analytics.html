<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SkillBridge Admin — Platform analytics and insights.">
    <title>SkillBridge | Analytics</title>

    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-5);
            margin-bottom: var(--space-6);
        }
        .chart-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            box-shadow: var(--shadow-xs);
        }
        .chart-card--wide {
            grid-column: 1 / -1;
        }
        .chart-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-4);
        }
        .chart-card__title {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        .chart-card__title i { color: var(--color-primary); }
        .chart-container { position: relative; height: 280px; }
        .metric-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        .metric-tile {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }
        .metric-tile__icon {
            width: 48px; height: 48px;
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .metric-tile__value { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); }
        .metric-tile__label { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: 2px; }
    </style>
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar__brand">
            <div class="sidebar__brand-icon">SB</div>
            <span class="sidebar__brand-text">Admin Panel</span>
        </a>
        <nav class="sidebar__nav">
            <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-gauge-high"></i></span><span class="sidebar__text">Overview</span></a>
            <a href="users.html"     class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-users"></i></span><span class="sidebar__text">User Management</span></a>
            <a href="posts.html"     class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-clipboard-list"></i></span><span class="sidebar__text">Post Moderation</span></a>
            <span class="sidebar__nav-section">System</span>
            <a href="analytics.html" class="sidebar__link active"><span class="sidebar__icon"><i class="fa-solid fa-chart-line"></i></span><span class="sidebar__text">Analytics</span></a>
            <a href="logs.html"      class="sidebar__link"><span class="sidebar__icon"><i class="fa-solid fa-scroll"></i></span><span class="sidebar__text">Audit Logs</span></a>
        </nav>
        <div class="sidebar__footer">
            <div class="sidebar__user">
                <div class="sidebar__avatar" id="user-avatar" style="background:var(--color-danger);">A</div>
                <div class="sidebar__user-info">
                    <div class="sidebar__user-name" id="user-name">Admin</div>
                    <div class="sidebar__user-role" style="color:var(--color-danger);">Administrator</div>
                </div>
            </div>
            <button class="btn btn--ghost btn--full" id="btn-logout" style="margin-top:var(--space-2); justify-content:flex-start; color:var(--color-danger); font-size:var(--font-size-xs);"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-header">
            <div class="header__left">
                <button class="header__menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <span class="header__page-title">Analytics</span>
            </div>
            <div class="header__right">
                <span style="font-size:var(--font-size-xs); color:var(--color-danger); font-weight:var(--font-weight-semibold); background:var(--color-danger-bg); padding:var(--space-1) var(--space-3); border-radius:var(--radius-full);"><i class="fa-solid fa-shield-halved"></i> Admin Mode</span>
            </div>
        </header>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Platform Analytics</h1>
                    <p class="page-subtitle" id="analytics-subtitle">Loading platform statistics…</p>
                </div>
            </div>

            <!-- Metric Tiles -->
            <div class="metric-row" id="metric-row">
                <div class="skeleton" style="height:88px; border-radius:var(--radius-lg);"></div>
                <div class="skeleton" style="height:88px; border-radius:var(--radius-lg);"></div>
                <div class="skeleton" style="height:88px; border-radius:var(--radius-lg);"></div>
                <div class="skeleton" style="height:88px; border-radius:var(--radius-lg);"></div>
            </div>

            <!-- Charts -->
            <div class="analytics-grid" id="charts-grid" style="display:none;">
                <div class="chart-card chart-card--wide">
                    <div class="chart-card__header">
                        <div class="chart-card__title"><i class="fa-solid fa-chart-line"></i> New Registrations (Last 30 Days)</div>
                    </div>
                    <div class="chart-container"><canvas id="chart-registrations"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-card__header">
                        <div class="chart-card__title"><i class="fa-solid fa-file-lines"></i> Applications by Status</div>
                    </div>
                    <div class="chart-container"><canvas id="chart-apps-status"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-card__header">
                        <div class="chart-card__title"><i class="fa-solid fa-briefcase"></i> Post Types Distribution</div>
                    </div>
                    <div class="chart-container"><canvas id="chart-post-types"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-card__header">
                        <div class="chart-card__title"><i class="fa-solid fa-users"></i> Users by Role</div>
                    </div>
                    <div class="chart-container"><canvas id="chart-user-roles"></canvas></div>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/utils.js"></script>
<script>
const CHART_COLORS = {
    primary:   '#004ac6',
    success:   '#16a34a',
    warning:   '#d97706',
    danger:    '#dc2626',
    info:      '#0891b2',
    muted:     '#94a3b8',
};

let chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
        legend: { labels: { font: { family: 'var(--font-family, Inter, sans-serif)', size: 12 } } }
    }
};

(async () => {
    const user = await auth.requireRole('admin');
    if (!user) return;
    document.getElementById('user-name').textContent   = user.full_name;
    document.getElementById('user-avatar').textContent = utils.initials(user.full_name);

    try {
        const [users, postsData, appsData] = await Promise.all([
            api.get('/admin/users'),
            api.get('/admin/posts', { page: 1 }),
            api.get('/admin/applications').catch(() => ({ items: [] })),
        ]);

        const totalUsers   = users.length;
        const students     = users.filter(u => u.role === 'student').length;
        const companies    = users.filter(u => u.role === 'company').length;
        const totalPosts   = postsData.pagination?.total_items || postsData.items?.length || 0;

        // Quick gather all applications across pages
        let allApps = appsData.items || [];

        document.getElementById('analytics-subtitle').textContent =
            `Platform overview · ${totalUsers} users · ${totalPosts} posts`;

        // Render metric tiles
        document.getElementById('metric-row').innerHTML = `
            <div class="metric-tile">
                <div class="metric-tile__icon" style="background:rgba(0,74,198,0.12); color:var(--color-primary);">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div>
                    <div class="metric-tile__value">${totalUsers}</div>
                    <div class="metric-tile__label">Total Users</div>
                </div>
            </div>
            <div class="metric-tile">
                <div class="metric-tile__icon" style="background:rgba(22,163,74,0.12); color:var(--color-success);">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <div class="metric-tile__value">${students}</div>
                    <div class="metric-tile__label">Students</div>
                </div>
            </div>
            <div class="metric-tile">
                <div class="metric-tile__icon" style="background:rgba(217,119,6,0.12); color:var(--color-warning);">
                    <i class="fa-solid fa-building"></i>
                </div>
                <div>
                    <div class="metric-tile__value">${companies}</div>
                    <div class="metric-tile__label">Companies</div>
                </div>
            </div>
            <div class="metric-tile">
                <div class="metric-tile__icon" style="background:rgba(8,145,178,0.12); color:var(--color-info, #0891b2);">
                    <i class="fa-solid fa-briefcase"></i>
                </div>
                <div>
                    <div class="metric-tile__value">${totalPosts}</div>
                    <div class="metric-tile__label">Total Posts</div>
                </div>
            </div>
        `;

        document.getElementById('charts-grid').style.display = '';

        // --- Registrations chart: group users by day (last 30 days) ---
        const now = new Date();
        const days = Array.from({ length: 30 }, (_, i) => {
            const d = new Date(now);
            d.setDate(d.getDate() - (29 - i));
            return d.toISOString().split('T')[0];
        });
        const regMap = {};
        days.forEach(d => regMap[d] = 0);
        users.forEach(u => {
            const day = (u.created_at || '').split('T')[0];
            if (regMap[day] !== undefined) regMap[day]++;
        });

        new Chart(document.getElementById('chart-registrations'), {
            type: 'line',
            data: {
                labels: days.map(d => {
                    const [, m, day] = d.split('-');
                    return `${parseInt(day)} ${new Date(d).toLocaleString('default', { month: 'short' })}`;
                }),
                datasets: [{
                    label: 'New Users',
                    data: days.map(d => regMap[d]),
                    borderColor: CHART_COLORS.primary,
                    backgroundColor: 'rgba(0,74,198,0.08)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: CHART_COLORS.primary,
                }]
            },
            options: { ...chartDefaults, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
        });

        // --- Application status donut ---
        const pending  = allApps.filter(a => a.status === 'pending').length;
        const accepted = allApps.filter(a => a.status === 'accepted').length;
        const rejected = allApps.filter(a => a.status === 'rejected').length;

        new Chart(document.getElementById('chart-apps-status'), {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'Accepted', 'Rejected'],
                datasets: [{ data: [pending || 1, accepted || 0, rejected || 0],
                    backgroundColor: [CHART_COLORS.warning, CHART_COLORS.success, CHART_COLORS.danger],
                    borderWidth: 0 }]
            },
            options: { ...chartDefaults }
        });

        // --- Post types bar chart ---
        const allPostItems = postsData.items || [];
        const internships = allPostItems.filter(p => p.type === 'internship').length;
        const jobs        = allPostItems.filter(p => p.type === 'job').length;
        const challenges  = allPostItems.filter(p => p.type === 'challenge').length;

        new Chart(document.getElementById('chart-post-types'), {
            type: 'bar',
            data: {
                labels: ['Internships', 'Jobs', 'Challenges'],
                datasets: [{ label: 'Posts',
                    data: [internships, jobs, challenges],
                    backgroundColor: [CHART_COLORS.primary, CHART_COLORS.success, CHART_COLORS.warning],
                    borderRadius: 6 }]
            },
            options: { ...chartDefaults, plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
        });

        // --- User roles pie ---
        const admins = users.filter(u => u.role === 'admin').length;
        new Chart(document.getElementById('chart-user-roles'), {
            type: 'pie',
            data: {
                labels: ['Students', 'Companies', 'Admins'],
                datasets: [{ data: [students, companies, admins],
                    backgroundColor: [CHART_COLORS.primary, CHART_COLORS.success, CHART_COLORS.danger],
                    borderWidth: 0 }]
            },
            options: { ...chartDefaults }
        });

    } catch (err) {
        document.getElementById('analytics-subtitle').textContent = 'Failed to load analytics.';
        toast.error('Error', err.message || 'Failed to load analytics data.');
    }
})();

document.getElementById('menu-btn').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('btn-logout').addEventListener('click', async () =>
    await auth.logout());
</script>

</body>
</html>
